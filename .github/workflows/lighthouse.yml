name: Lighthouse Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      # these should be defined in the repo's Secrets settings
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      MERCADOPAGO_ACCESS_TOKEN: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      GOOGLE_MERCHANT_ID: ${{ secrets.GOOGLE_MERCHANT_ID }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          sleep 5

      - name: Install Chrome for Lighthouse
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - name: Run Lighthouse CI
        # use the same LHCI config that you already created earlier; it handles
        # starting the server, running multiple passes, asserting thresholds and
        # uploading the report.  this avoids the chrome‑interstitial errors we saw
        # when calling `npx lighthouse` directly.
        run: |
          # install the CLI from npm each time so the workflow doesn’t depend on a
          # cached `npx` version with the weird greeting message
          npx -p @lhci/cli lhci autorun

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report.json
